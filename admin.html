<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Admin - Produtos</title>

<style>
body {
  font-family: Arial;
  background: #222;
  color: #fff;
}

.container {
  max-width: 400px;
  margin: auto;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 10px;
  background: #4caf50;
  border: none;
  color: white;
  font-weight: bold;
  margin-bottom: 5px;
}

.produto {
  background: #333;
  padding: 10px;
  margin-bottom: 5px;
}

.delete {
  background: red;
}
</style>

</head>
<body>

<div class="container">

<h2>⚙️ Gerenciar Produtos</h2>

<input type="text" id="nome" placeholder="Nome do produto">
<input type="number" id="preco" placeholder="Preço">
<textarea id="descricao" placeholder="Ingredientes (ex: pão, carne, queijo)"></textarea>
<input type="text" id="imagem" placeholder="URL da imagem">
<button onclick="salvar()">➕ Salvar Produto</button>

<hr>

<div id="lista"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBZE-EDNUf1Li-kcUx_bhw51ho7dlqXbmM",
  authDomain: "realidade-60bdb.firebaseapp.com",
  databaseURL: "https://realidade-60bdb-default-rtdb.firebaseio.com",
  projectId: "realidade-60bdb",
  storageBucket: "realidade-60bdb.firebasestorage.app",
  messagingSenderId: "510520738222",
  appId: "1:510520738222:web:272dc6dd89a53d5d02c83f"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// SALVAR
window.salvar = function() {
  let nome = document.getElementById("nome").value;
  let preco = parseFloat(document.getElementById("preco").value);
  let descricao = document.getElementById("descricao").value;
  let imagem = document.getElementById("imagem").value;

  if (!nome || !preco) {
    alert("Preencha tudo!");
    return;
  }

  push(ref(db, "produtos"), {
    nome: nome,
    preco: preco,
    descricao: descricao,
    imagem: imagem
  });

  document.getElementById("nome").value = "";
  document.getElementById("preco").value = "";
  document.getElementById("descricao").value = "";
  document.getElementById("imagem").value = "";
}
  let imagem = document.getElementById("imagem").value;

push(ref(db, "produtos"), {
  nome: nome,
  preco: preco,
  descricao: descricao,
  imagem: imagem
});
}

// LISTAR
onValue(ref(db, "produtos"), (snapshot) => {
  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  snapshot.forEach(item => {
    let p = item.val();
    let id = item.key;

    lista.innerHTML += `
      <div class="produto">
        <strong>${p.nome}</strong> - R$ ${p.preco}
        <br><small>${p.descricao || ""}</small>

       <button onclick="editar('${id}', '${p.nome}', '${p.preco}', \`${p.descricao || ""}\`, '${p.imagem || ""}')">
          ✏️ Editar
        </button>

        <button class="delete" onclick="deletar('${id}')">
          Excluir
        </button>
      </div>
    `;
  });
});

// DELETAR
window.deletar = function(id) {
  if (!confirm("Excluir produto?")) return;
  remove(ref(db, "produtos/" + id));
}

// EDITAR
window.editar = function(id, nome, preco, descricao, imagem) {

  let novoNome = prompt("Editar nome:", nome);
  if (novoNome === null) return;

  let novoPreco = prompt("Editar preço:", preco);
  if (novoPreco === null) return;

  let novaDescricao = prompt("Editar descrição:", descricao);
  if (novaDescricao === null) return;

  let novaImagem = prompt("Editar URL da imagem:", imagem);
  if (novaImagem === null) return;

  update(ref(db, "produtos/" + id), {
    nome: novoNome,
    preco: parseFloat(novoPreco),
    descricao: novaDescricao,
    imagem: novaImagem
  });

}
</script>

</body>
</html>
