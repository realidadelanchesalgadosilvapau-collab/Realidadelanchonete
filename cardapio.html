<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
    <!-- Esta é a linha que faz a mágica: -->
   <link rel="icon" type="image/png" href="realidade.png">

<title>Cardápio Online</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e53935">
<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
}

.container {
  max-width: 400px;
  margin: auto;
  padding: 15px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 12px;
  background: #e53935;
  color: white;
  border: none;
  font-weight: bold;
  margin-bottom: 5px;
}

.item {
  border-bottom: 1px solid #444;
  padding: 5px 0;
}

#cardapio {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.card {
  background: #222;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
}

.card img {
  width: 100%;
  height: 90px;
  object-fit: cover;
  border-radius: 8px;
}

/* 🔥 BOTÕES DE PAGAMENTO */
.pagamento {
  flex: 1;
  background: #333;
}

.pagamento.ativo {
  background: #4caf50;
}

#pagamentoBox {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="container">

<h2>🍔 Fazer Pedido</h2>

<input type="text" id="cliente" placeholder="Seu nome">
<input type="tel" id="telefone" placeholder="Seu WhatsApp">
<input type="text" id="cep" placeholder="CEP">
<input type="text" id="endereco" placeholder="Seu endereço">

<img id="foto" style="width:100%; margin-bottom:10px; border-radius:10px;">

<!-- CARDÁPIO -->
<div id="cardapio"></div>

<textarea id="obs" placeholder="Observação..."></textarea>

<!-- 🔥 PAGAMENTO MELHORADO -->
<div id="pagamentoBox">
  <button type="button" class="pagamento ativo" onclick="selecionarPagamento('entrega', this)">💵 Entrega</button>
  <button type="button" class="pagamento" onclick="selecionarPagamento('pix', this)">💳 PIX / Cartão</button>
</div>
<div id="statusPedido" style="display:none; background:#222; padding:15px; margin-top:10px; border-radius:10px;">
  <h3>📦 Seu pedido</h3>
  <div id="statusTexto">Aguardando...</div>
</div>
<hr>

<div id="lista"></div>

<hr>

<!-- Resumo detalhado para o cliente -->
<div style="background: #222; padding: 15px; border-radius: 10px; margin: 15px 0; border: 1px solid #333;">
  <p style="display: flex; justify-content: space-between; margin: 5px 0;">
    <span>Produtos:</span> 
    <span>R$ <span id="valorProdutos">0.00</span></span>
  </p>
  <p style="display: flex; justify-content: space-between; margin: 5px 0; color: #ffeb3b;">
    <span>Taxa de Entrega:</span> 
    <span>R$ <span id="valorTaxa">0.00</span></span>
  </p>
  <h3 style="display: flex; justify-content: space-between; margin: 10px 0; color: #4caf50; border-top: 1px solid #444; padding-top: 10px;">
    <span>Total a Pagar:</span> 
    <span>R$ <span id="total">0.00</span></span>
  </h3>
</div>

<button onclick="enviar()" style="background: #4caf50; color: white; width: 100%; padding: 15px; font-size: 18px; border-radius: 8px; border: none; font-weight: bold;">
  📤 Enviar Pedido
</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, push, get, onValue, update, set } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

/* 🔥 CONFIG FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyBZE-EDNUf1Li-kcUx_bhw51ho7dlqXbmM",
  authDomain: "realidade-60bdb.firebaseapp.com",
  databaseURL: "https://realidade-60bdb-default-rtdb.firebaseio.com",
  projectId: "realidade-60bdb",
  storageBucket: "realidade-60bdb.firebasestorage.app",
  messagingSenderId: "510520738222",
  appId: "1:510520738222:web:272dc6dd89a53d5d02c83f"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* 🔥 VARIÁVEIS GLOBAIS */
let pedidos = [];
let produtos = [];
let total = 0;
let formaPagamento = "entrega";
let latDestino = null;
let lonDestino = null;

/* 📍 CONFIGURAÇÃO DA LANCHONETE */
const MINHA_LAT = -23.5578102; // minha coordenadas
const MINHA_LON = -46.4154916; // minha coordenadas

// --- ESSA FUNÇÃO ESTAVA FALTANDO NO SEU CÓDIGO ---
function calcularDistancia(lat1, lon1, lat2, lon2) {
    const R = 6371; 
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * 
              Math.sin(dLon/2) * Math.sin(dLon/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
}

/* 🔥 CEP AUTO-COMPLETAR */document.getElementById("cep").addEventListener("blur", function() {
    let cep = this.value.replace(/\D/g, "");
    if (cep.length !== 8) return;

    fetch(`https://viacep.com.br/ws/${cep}/json/`)
        .then(res => res.json())
        .then(dados => {
            if (!dados.erro) {
                const rua = dados.logradouro;
                const bairro = dados.bairro;
                const cidade = dados.localidade;
                const estado = dados.uf;
                
                // 1. Preenche o campo de endereço na tela
                document.getElementById("endereco").value = `${rua}, ${bairro} - ${cidade}`;
                
                // 2. Prepara a busca do mapa com o bairro incluso
                const buscaMapa = encodeURIComponent(`${rua}, ${bairro}, ${cidade}, Brazil`);
                
                // 3. Busca a localização
                fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${buscaMapa}&limit=1`)
                    .then(r => r.json()) // Apenas uma vez aqui!
                    .then(geo => {
                        if (geo.length > 0) {
                            latDestino = parseFloat(geo[0].lat);
                            lonDestino = parseFloat(geo[0].lon);
                            console.log("📍 Localizado:", latDestino, lonDestino);
                        } else {
                            // Plano B: Se não achou pela rua, tenta pelo CEP
                            return fetch(`https://nominatim.openstreetmap.org/search?format=json&postalcode=${cep}&country=Brazil&limit=1`)
                                .then(r => r.json())
                                .then(geoCep => {
                                    if (geoCep.length > 0) {
                                        latDestino = parseFloat(geoCep[0].lat);
                                        lonDestino = parseFloat(geoCep[0].lon);
                                        console.log("📍 Localizado pelo CEP (Plano B)");
                                    }
                                });
                        }
                    })
                    .catch(err => console.error("Erro no mapa:", err))
                    .finally(() => {
                        // 4. Calcula a taxa com as coordenadas obtidas
                        atualizarTela(); 
                    });
            }
        });
});

  //codigo do pagamento  
window.selecionarPagamento = function(tipo, el) {
  formaPagamento = tipo;
  document.querySelectorAll(".pagamento").forEach(btn => btn.classList.remove("ativo"));
  el.classList.add("ativo");
};

onValue(ref(db, "produtos"), (snapshot) => {
  produtos = [];
  snapshot.forEach(item => { produtos.push(item.val()); });
  carregarProdutos();
});

function carregarProdutos() {
  let div = document.getElementById("cardapio");
  div.innerHTML = "";
  produtos.forEach((p, i) => {
    div.innerHTML += `
      <div class="card" onclick="selecionar(${i})">
        <img src="${p.imagem ? p.imagem : 'https://via.placeholder.com/150'}" onerror="this.src='https://via.placeholder.com/150'">
        <strong>${p.nome}</strong><br>
        R$ ${p.preco}
      </div>
    `;
  });
  if (produtos.length > 0) document.getElementById("foto").src = produtos[0].imagem || "";
}

window.selecionar = function(index) {
  let produto = produtos[index];
  document.getElementById("foto").src = produto.imagem || "";
  let obs = prompt("Observação?");
  pedidos.push({ nome: produto.nome, preco: produto.preco, obs: obs || "" });
  total += Number(produto.preco); 
  atualizarTela();
};

// 🔥 FUNÇÃO ÚNICA E CORRIGIDA: ATUALIZAR A TELA DO CARDÁPIO
function atualizarTela() {
    // 1. Limpa e mostra os itens no carrinho
    let lista = document.getElementById("lista");
    if (lista) {
        lista.innerHTML = "";
        pedidos.forEach(item => {
            lista.innerHTML += `<div class="item">${item.nome}<br><small>${item.obs}</small></div>`;
        });
    }

    // 2. Pega o endereço e define a taxa padrão inicial
    let enderecoCampo = document.getElementById("endereco").value;
    let taxaEntrega = 0;

    // 3. REGRA DE CÁLCULO (Distância ou Retirada)
    if (enderecoCampo && enderecoCampo.trim() !== "" && enderecoCampo !== "Retirada") {
        
        // Verificamos se temos as coordenadas (Latitude e Longitude)
        if (latDestino !== null && lonDestino !== null) {
            
            // Fazemos o cálculo real da distância
            let km = calcularDistancia(
                Number(MINHA_LAT), 
                Number(MINHA_LON), 
                Number(latDestino), 
                Number(lonDestino)
            );
            
            // Mostra no console do navegador para conferência
            console.log("Distância calculada:", km.toFixed(2), "KM");

            // A REGRA: Se for menor ou igual a 2km, cobra 3. Se não, cobra 5.
            if (km <= 2.0) {
                taxaEntrega = 3.00;
            } else {
                taxaEntrega = 5.00;
            }
        } else {
            // Se o mapa ainda não respondeu a posição, mantemos 5.00 por segurança
            taxaEntrega = 5.00;
        }
    } else {
        // Se o campo estiver vazio ou for "Retirada", a taxa é zero
        taxaEntrega = 0.00;
    }

    // 4. CÁLCULO DOS TOTAIS
    let valorApenasProdutos = Number(total); 
    let valorTotalGeral = valorApenasProdutos + taxaEntrega;

    // 5. ATUALIZA OS CAMPOS NO HTML (DADOS NA TELA)
    if(document.getElementById("valorProdutos")) {
        document.getElementById("valorProdutos").innerText = valorApenasProdutos.toFixed(2);
    }
    if(document.getElementById("valorTaxa")) {
        document.getElementById("valorTaxa").innerText = taxaEntrega.toFixed(2);
    }
    if(document.getElementById("total")) {
        document.getElementById("total").innerText = valorTotalGeral.toFixed(2);
    }
}
//funcao enviar pra cozinha
window.enviar = function() {
  let cliente = document.getElementById("cliente").value;
  let telefone = document.getElementById("telefone").value;
  let endereco = document.getElementById("endereco").value;

  if (!cliente || !telefone) { alert("Preencha nome e telefone"); return; }
  if (pedidos.length === 0) { alert("Adicione itens"); return; }

  // --- CALCULA A TAXA REAL PARA O FIREBASE ---
  let taxaEnvio = 0;
  if (endereco && endereco !== "Retirada") {
      if (latDestino && lonDestino) {
          let km = calcularDistancia(MINHA_LAT, MINHA_LON, latDestino, lonDestino);
          taxaEnvio = (km <= 2.0) ? 3.00 : 5.00;
      } else {
          taxaEnvio = 5.00;
      }
  }

  let totalComEntrega = Number(total) + taxaEnvio;
  let resumo = pedidos.map(p => `${p.nome} (${p.obs || "sem obs"})`).join("\n");
  let novoPedidoRef = push(ref(db, "pedidos"));

  set(novoPedidoRef, {
    pedidoId: novoPedidoRef.key,
    cliente, 
    telefone, 
    endereco: endereco || "Retirada",
    pedido: resumo, 
    total: totalComEntrega,
    taxaEntrega: taxaEnvio,
    hora: new Date().toLocaleTimeString(),
    formaPagamento, 
    status: "novo"
}).then(() => {
    // 1. Salva o ID para o cliente poder acompanhar
    const idGerado = novoPedidoRef.key;
    localStorage.setItem("pedidoId", idGerado);
    
    // 2. Zera as variáveis de controle (Apenas uma vez)
    pedidos = []; 
    total = 0; 
    latDestino = null; 
    lonDestino = null;

    // 3. Limpa todos os campos do formulário
    document.getElementById("cliente").value = "";
    document.getElementById("telefone").value = "";
    document.getElementById("endereco").value = "";
    document.getElementById("cep").value = "";
    if(document.getElementById("obs")) document.getElementById("obs").value = "";

    // 4. Atualiza a tela (vai mostrar Produtos 0.00 / Taxa 0.00 / Total 0.00)
    atualizarTela();
    
    // 5. Inicia o acompanhamento do status
    acompanharPedido(idGerado);
    
    alert("Pedido enviado com sucesso!");
  });
};

function acompanharPedido(id) {
  if (!id) return;
  const statusBox = document.getElementById("statusPedido");
  const statusTexto = document.getElementById("statusTexto");

  // Criamos uma referência para o pedido específico
  const pedidoRef = ref(db, "pedidos/" + id);

  onValue(pedidoRef, (snapshot) => {
    if (!snapshot.exists()) {
      statusBox.style.display = "none";
      return;
    }
    const p = snapshot.val();
    statusBox.style.display = "block";

    if (p.status === "novo") {
      statusTexto.innerHTML = "⏳ <b>Pedido recebido!</b><br>Aguardando a cozinha...";
    } 
    else if (p.status === "preparo") {
      statusTexto.innerHTML = "👨‍🍳 <b>O lanche está sendo preparado!</b>";
      statusTexto.style.color = "#ff9800";
    } 
    else if (p.status === "saiu") {
      statusTexto.innerHTML = "🛵 <b>Saiu para entrega!</b><br>O motoboy está a caminho.";
      statusTexto.style.color = "#4caf50";
    } 
    else if (p.status === "entregue" || p.status === "finalizado") {
      statusTexto.innerHTML = "✅ <b>Pedido entregue! Bom apetite.</b>";
      statusTexto.style.color = "#4caf50";
      
      // ESPERA 30 SEGUNDOS E SOME COM A MENSAGEM
      setTimeout(() => {
        statusBox.style.display = "none";
        localStorage.removeItem("pedidoId"); // Limpa para o próximo pedido
      }, 30000); 
    }
  });
}

window.addEventListener("load", () => {
  document.getElementById("endereco").addEventListener("input", atualizarTela);
  let pedidoId = localStorage.getItem("pedidoId");
  if (pedidoId) acompanharPedido(pedidoId);
});

</script>

</body>
</html>
