<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cardápio Online</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e53935">
<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
}

.container {
  max-width: 400px;
  margin: auto;
  padding: 15px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 12px;
  background: #e53935;
  color: white;
  border: none;
  font-weight: bold;
  margin-bottom: 5px;
}

.item {
  border-bottom: 1px solid #444;
  padding: 5px 0;
}

#cardapio {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.card {
  background: #222;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
}

.card img {
  width: 100%;
  height: 90px;
  object-fit: cover;
  border-radius: 8px;
}

/* 🔥 BOTÕES DE PAGAMENTO */
.pagamento {
  flex: 1;
  background: #333;
}

.pagamento.ativo {
  background: #4caf50;
}

#pagamentoBox {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="container">

<h2>🍔 Fazer Pedido</h2>

<input type="text" id="cliente" placeholder="Seu nome">
<input type="tel" id="telefone" placeholder="Seu WhatsApp">
<input type="text" id="cep" placeholder="CEP">
<input type="text" id="endereco" placeholder="Seu endereço">

<img id="foto" style="width:100%; margin-bottom:10px; border-radius:10px;">

<!-- CARDÁPIO -->
<div id="cardapio"></div>

<textarea id="obs" placeholder="Observação..."></textarea>

<!-- 🔥 PAGAMENTO MELHORADO -->
<div id="pagamentoBox">
  <button type="button" class="pagamento ativo" onclick="selecionarPagamento('entrega', this)">💵 Entrega</button>
  <button type="button" class="pagamento" onclick="selecionarPagamento('pix', this)">💳 PIX / Cartão</button>
</div>
<div id="statusPedido" style="display:none; background:#222; padding:15px; margin-top:10px; border-radius:10px;">
  <h3>📦 Seu pedido</h3>
  <div id="statusTexto">Aguardando...</div>
</div>
<hr>

<div id="lista"></div>

<hr>

<div style="font-weight:bold;">
  Total: R$ <span id="total">0</span>
</div>

<button onclick="enviar()">📤 Enviar Pedido</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, push, onValue, set } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

/* 🔥 CONFIG FIREBASE */
  
const firebaseConfig = {
  apiKey: "AIzaSyBZE-EDNUf1Li-kcUx_bhw51ho7dlqXbmM",
  authDomain: "realidade-60bdb.firebaseapp.com",
  databaseURL: "https://realidade-60bdb-default-rtdb.firebaseio.com",
  projectId: "realidade-60bdb",
  storageBucket: "realidade-60bdb.firebasestorage.app",
  messagingSenderId: "510520738222",
  appId: "1:510520738222:web:272dc6dd89a53d5d02c83f"
};
document.getElementById("telefone").addEventListener("input", function() {
  this.value = this.value.replace(/\D/g, "");
});
  document.getElementById("cep").addEventListener("blur", function() {
  let cep = this.value.replace(/\D/g, "");

  if (cep.length !== 8) return;

  fetch(`https://viacep.com.br/ws/${cep}/json/`)
    .then(res => res.json())
    .then(dados => {
      if (!dados.erro) {
        document.getElementById("endereco").value =
          dados.logradouro + ", " +
          dados.bairro + " - " +
          dados.localidade;
      }
    });
});
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* 🔥 VARIÁVEIS GLOBAIS (IMPORTANTE) */
let pedidos = [];
let produtos = [];
let total = 0;
let formaPagamento = "entrega";
let chavePix = "SEU_PIX_AQUI"; // telefone, cpf ou email
/* 🔥 ESCOLHER PAGAMENTO */
window.selecionarPagamento = function(tipo, el) {
  formaPagamento = tipo;

  document.querySelectorAll(".pagamento").forEach(btn => {
    btn.classList.remove("ativo");
  });

  el.classList.add("ativo");
};

/* 🔥 TELEFONE NUMÉRICO */
document.getElementById("telefone").addEventListener("input", function() {
  this.value = this.value.replace(/\D/g, "");
});

/* 🔥 CARREGAR PRODUTOS */
onValue(ref(db, "produtos"), (snapshot) => {
  produtos = [];

  snapshot.forEach(item => {
    produtos.push(item.val());
  });

  carregarProdutos();
});

/* 🔥 MOSTRAR CARDÁPIO */
function carregarProdutos() {
  let div = document.getElementById("cardapio");
  div.innerHTML = "";

  produtos.forEach((p, i) => {
    div.innerHTML += `
      <div class="card" onclick="selecionar(${i})">
        <img src="${p.imagem ? p.imagem : 'https://via.placeholder.com/150'}"
             onerror="this.src='https://via.placeholder.com/150'">
        <strong>${p.nome}</strong><br>
        R$ ${p.preco}
      </div>
    `;
  });

  if (produtos.length > 0) {
    document.getElementById("foto").src = produtos[0].imagem || "";
  }
}

/* 🔥 CLICAR NO PRODUTO */
window.selecionar = function(index) {
  let produto = produtos[index];

  document.getElementById("foto").src = produto.imagem || "";

  let obs = prompt("Observação?");

  pedidos.push({
    nome: produto.nome,
    preco: produto.preco,
    obs: obs || ""
  });

  total += produto.preco;
  atualizarTela();
};

/* 🔥 ATUALIZAR TELA */
function atualizarTela() {
  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  pedidos.forEach(item => {
    lista.innerHTML += `
      <div class="item">
        ${item.nome}
        <br><small>${item.obs}</small>
      </div>
    `;
  });

  document.getElementById("total").innerText = total;
}

/* 🔥 ENVIAR PEDIDO */
window.enviar = function() {

  let cliente = document.getElementById("cliente").value;
  let telefone = document.getElementById("telefone").value;
  let endereco = document.getElementById("endereco").value;

  if (!cliente || !telefone) {
    alert("Preencha nome e telefone");
    return;
  }

  if (pedidos.length === 0) {
    alert("Adicione itens");
    return;
  }

  let resumo = pedidos.map(p =>
    `${p.nome} (${p.obs || "sem observação"})`
  ).join("\n");

  // 🔥 CRIA REFERÊNCIA COM ID
  let novoPedidoRef = push(ref(db, "pedidos"));

  // 🔥 SALVA NO FIREBASE
 set(novoPedidoRef, {
  pedidoId: novoPedidoRef.key, // 🔥 ESSENCIAL
  cliente,
  telefone,
  endereco: endereco || "Retirada",
  pedido: resumo,
  total,
  hora: new Date().toLocaleTimeString(),
  formaPagamento,
  statusPagamento: "pendente",
  status: "novo"
}).then(() => {

    // 🔥 SALVA ID NO CELULAR
    localStorage.setItem("pedidoId", novoPedidoRef.key);
acompanharPedido(novoPedidoRef.key);
    // 🔥 DEBUG (DEPOIS VOCÊ PODE APAGAR)
    console.log("ID SALVO:", novoPedidoRef.key);
    alert("ID SALVO: " + novoPedidoRef.key);

    if (formaPagamento === "pix") {

      let mensagem = `
💰 PAGAMENTO VIA PIX

Valor: R$ ${total}

Chave PIX:
${chavePix}

📲 Envie o comprovante no WhatsApp para confirmar seu pedido.
      `;

      alert(mensagem);

      let texto = encodeURIComponent(
`Pedido realizado!\nTotal: R$ ${total}\nVou enviar o comprovante do PIX.`
      );

      window.open(`https://wa.me/11976681884?text=${texto}`);

    } else {

      alert("Pedido enviado! Pague na entrega.");

    }

    // 🔥 LIMPAR PEDIDO
    pedidos = [];
    total = 0;
    atualizarTela();

    document.getElementById("cliente").value = "";
    document.getElementById("telefone").value = "";
    document.getElementById("endereco").value = "";

  })
  .catch((erro) => {
    console.log("ERRO AO SALVAR:", erro);
    alert("Erro ao salvar: " + erro.message);
  });
};
  //aqui por o codigo de espera
  let pedidoId = localStorage.getItem("pedidoId");

  let statusBox = document.getElementById("statusPedido");
  let statusTexto = document.getElementById("statusTexto");

  statusBox.style.display = "block";

  let texto = "⏳ Pedido recebido";

  if (p.status === "novo") texto = "⏳ Pedido recebido";
  if (p.status === "preparo") texto = "👨‍🍳 Em preparo";
  if (p.status === "saiu") texto = "🛵 Saiu para entrega";
  if (p.status === "entregue") texto = "✅ Entregue";

  statusTexto.innerText = texto;

  if (p.status === "entregue") {
    setTimeout(() => {
      localStorage.removeItem("pedidoId");
      statusBox.style.display = "none";
    }, 5000);
  }

});
  }

</script>

</body>
</html>
