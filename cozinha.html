<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
    <!-- Esta é a linha que faz a mágica: -->
   <link rel="icon" type="image/png" href="realidade.png">

<title>Cozinha</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: #fff;
}

h2 { text-align: center; }

#conteudo {
  display: none;
}

.pedido {
  background: #222;
  margin: 10px;
  padding: 15px;
  border-radius: 10px;
  border-left: 5px solid yellow;
}

button {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  border: none;
  font-weight: bold;
  cursor: pointer;
  border-radius: 5px;
}

.btn-local {
  background: #2196f3;
}

.btn-entrega {
  background: #4caf50;
}

.info { font-size: 14px; color: #ccc; }

#btnSom {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: red;
  width: 70px;
  height: 70px;
  font-size: 26px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="senha" placeholder="Senha">
  <button onclick="login()">Entrar</button>
</div>

<!-- CONTEÚDO -->
<div id="conteudo">
  <h2>🍳 Pedidos</h2>
  <div id="lista"></div>

  <audio id="som">
    <source src="https://raw.githubusercontent.com/realidadelanchesalgadosilvapau-collab/Realidadelanchonete/main/lanchepedido.mp3"" type="audio/mpeg">
  </audio>

  <button id="btnSom" onclick="ativarSom()">🔊</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, onChildAdded, get, push, update, set } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

// 🔥 CONFIG

const firebaseConfig = {
  apiKey: "AIzaSyBZE-EDNUf1Li-kcUx_bhw51ho7dlqXbmM",
  authDomain: "realidade-60bdb.firebaseapp.com",
  databaseURL: "https://realidade-60bdb-default-rtdb.firebaseio.com",
  projectId: "realidade-60bdb",
  storageBucket: "realidade-60bdb.firebasestorage.app",
  messagingSenderId: "510520738222",
  appId: "1:510520738222:web:272dc6dd89a53d5d02c83f"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const lista = document.getElementById("lista");
const som = document.getElementById("som");

let liberado = false;

// 🔐 LOGIN
window.login = function() {
  let email = document.getElementById("email").value;
  let senha = document.getElementById("senha").value;

  signInWithEmailAndPassword(auth, email, senha)
    .catch((e) => alert("Erro: " + e.message));
};

// 🔓 LIBERAR TELA
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("conteudo").style.display = "block";
  }
});

// 🔊 SOM COM MEMÓRIA
//let jaLiberou = localStorage.getItem("somLiberado");

//if (jaLiberou) {
//  liberado = true;
//  document.getElementById("btnSom").style.display = "none";
  
//}

//funcao som
window.ativarSom = function() {
  som.play().then(() => {
    som.pause();
    som.currentTime = 0;

    liberado = true;
    localStorage.setItem("somLiberado", "1");

    document.getElementById("btnSom").style.display = "none";

    alert("🔔 Som ativado!");
  }).catch(() => {
    alert("Clique novamente para ativar o som");
  });
};
// 📥 PEDIDOS
onChildAdded(ref(db, "pedidos"), (snapshot) => {
  let p = snapshot.val();

  if (
    p.status === "pronto" || 
    p.status === "finalizado" || 
    p.status === "entregue"
  ) return;

  if (liberado) {
    som.currentTime = 0;
    som.play().catch(() => {});
  }

  let div = document.createElement("div");
  div.className = "pedido";

  
  let botoes = `
  <button onclick="marcarPreparo('${snapshot.key}', this)">
    👨‍🍳 Em preparo
  </button>
`;

if (p.tipo === "local") {
  botoes += `
    <button class="btn-local" onclick="finalizarLocal('${snapshot.key}', this)">
      🏪 Pronto (Local)
    </button>
  `;
} else {
  botoes += `
    <button class="btn-entrega" onclick="enviarEntrega('${snapshot.key}', this)">
      🛵 Enviar para Entrega
    </button>
  `;
}
  
  div.innerHTML = `
    <strong>👤 ${p.cliente}</strong><br>
    <span class="info">📞 ${p.telefone || "não informado"}</span><br>
    <span class="info">📍 ${p.endereco || "retirada no local"}</span><br>
    <span class="info">🕒 ${p.hora}</span><br><br>

    ${p.pedido.replace(/\n/g, "<br>")}

    <br><br>
    <strong>💰 Total: R$ ${p.total || 0}</strong>

    ${botoes}
  `;

  lista.prepend(div);
});
// BOTÃO PREPARO
window.marcarPreparo = function(id, botao) {
  const pedidoRef = ref(db, "pedidos/" + id);

  update(pedidoRef, {
    status: "preparo" // Isso deve ser EXATAMENTE igual ao que o cardápio lê
  }).then(() => {
    botao.innerText = "👨‍🍳 Preparando...";
    botao.style.background = "#ff9800";
    botao.disabled = true;
    console.log("Status 'preparo' enviado para o pedido: " + id);
  }).catch(erro => alert("Erro ao atualizar preparo: " + erro.message));
};

// BOTÃO MOTOBOY
window.enviarEntrega = function(id, botao) {
    console.log("Botão clicado! ID do pedido:", id); // Teste 1

    if (!confirm("Enviar para entrega?")) return;

    const pedidoRef = ref(db, "pedidos/" + id);

    get(pedidoRef).then((snapshot) => {
        console.log("Snapshot recebido do Firebase:", snapshot.exists()); // Teste 2

        if (!snapshot.exists()) {
            alert("Pedido não encontrado no banco de dados!");
            return;
        }

        const dados = snapshot.val();
        console.log("Dados do pedido recuperados:", dados); // Teste 3

        // 1. Atualiza o status original
        update(pedidoRef, { status: "saiu" })
            .then(() => {
                console.log("Status 'saiu' atualizado com sucesso!"); // Teste 4

                // 2. Envia para entregas_ativas
                return set(ref(db, "entregas_ativas/" + id), {
                    ...dados,
                    pedidoId: id,
                    status: "saiu"
                });
            })
            .then(() => {
                console.log("Cópia enviada para entregas_ativas!"); // Teste 5
                botao.parentElement.remove();
                alert("Motoboy avisado!");
            })
            .catch((erro) => {
                console.error("ERRO DETECTADO:", erro); // Aqui aparecerá o Permission Denied se existir
                alert("Erro ao enviar: " + erro.message);
            });
    }).catch((erro) => {
        console.error("Erro ao buscar pedido:", erro);
    });
};
// 🏪 FINALIZAR LOCAL
window.finalizarLocal = function(id, botao) {
  if (!confirm("Finalizar pedido local?")) return;

  update(ref(db, "pedidos/" + id), {
    status: "finalizado",
    tipo: "local"
  });

  botao.parentElement.remove();
};
</script>

</body>
</html>
