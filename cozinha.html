<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cozinha</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: #fff;
}

h2 {
  text-align: center;
}

.pedido {
  background: #222;
  margin: 10px;
  padding: 15px;
  border-radius: 10px;
  border-left: 5px solid yellow;
}

button {
  margin-top: 10px;
  padding: 8px;
  width: 100%;
  background: green;
  color: white;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.info {
  font-size: 14px;
  color: #ccc;
}

/* 🔊 BOTÃO SOM */
#btnSom {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: red;
  width: 70px;
  height: 70px;
  font-size: 26px;
}
</style>

</head>
<body>

<h2>🍳 Pedidos</h2>

<div id="lista"></div>

<!-- 🔔 SOM -->
<audio id="som">
  <source src="https://raw.githubusercontent.com/realidadelanchesalgadosilvapau-collab/Realidadelanchonete/main/lanchepedido.mp3" type="audio/mpeg">
</audio>

<!-- 🔊 BOTÃO -->
<button id="btnSom" onclick="ativarSom()">🔊</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, onChildAdded, remove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBZE-EDNUf1Li-kcUx_bhw51ho7dlqXbmM",
  authDomain: "realidade-60bdb.firebaseapp.com",
  databaseURL: "https://realidade-60bdb-default-rtdb.firebaseio.com",
  projectId: "realidade-60bdb",
  storageBucket: "realidade-60bdb.firebasestorage.app",
  messagingSenderId: "510520738222",
  appId: "1:510520738222:web:272dc6dd89a53d5d02c83f"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const lista = document.getElementById("lista");
const som = document.getElementById("som");

let liberado = false;

// 🔊 ATIVAR SOM (CLIQUE ÚNICO)
window.ativarSom = function() {
  som.play().then(() => {
    som.pause();
    som.currentTime = 0;

    liberado = true;

    document.getElementById("btnSom").style.display = "none";
  }).catch(() => {
    alert("Toque novamente para ativar o som");
  });
};

// 📦 NOVO PEDIDO
onChildAdded(ref(db, "pedidos"), (snapshot) => {
  let p = snapshot.val();

  // 🔔 SOM
  if (liberado) {
    som.currentTime = 0;
    som.play().catch(() => {});
  }

  let div = document.createElement("div");
  div.className = "pedido";

  div.innerHTML = `
    <strong>👤 ${p.cliente}</strong><br>
    <span class="info">📞 ${p.telefone || "não informado"}</span><br>
    <span class="info">📍 ${p.endereco || "retirada no local"}</span><br>
    <span class="info">🕒 ${p.hora}</span><br><br>

    ${p.pedido.replace(/\n/g, "<br>")}

    <br><br>
    <strong>💰 Total: R$ ${p.total || 0}</strong>

    <button onclick="finalizar('${snapshot.key}', this)">
      ✅ Pedido Pronto
    </button>
  `;

  lista.prepend(div);
});

// ✅ FINALIZAR
import { push, get } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

window.finalizar = function(id, botao) {
  if (!confirm("Enviar para entrega?")) return;

  let pedidoRef = ref(db, "pedidos/" + id);

  get(pedidoRef).then((snapshot) => {
    if (snapshot.exists()) {

      let dados = snapshot.val();

      // 👉 ENVIA PARA O MOTOBOY
     push(ref(db, "entregas"), {
  cliente: pedido.cliente,
  telefone: pedido.telefone,
  endereco: pedido.endereco,
  pedido: pedido.pedido,
  hora: pedido.hora,
  total: pedido.total,

  status: "novo" // 🔥 ESSA LINHA AQUI
});
      // 👉 REMOVE DA COZINHA
      remove(pedidoRef);

      // 👉 REMOVE DA TELA
      botao.parentElement.remove();
    }
  });
}
</script>

</body>
</html>
