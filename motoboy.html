<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Motoboy</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: #fff;
}

h2 {
  text-align: center;
}

.pedido {
  background: #222;
  margin: 10px;
  padding: 15px;
  border-radius: 10px;
  border-left: 5px solid #00c853;
}

button {
  margin-top: 8px;
  padding: 10px;
  width: 100%;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.maps {
  background: #2196f3;
  color: white;
}

.entregue {
  background: #4caf50;
  color: white;
}

.info {
  font-size: 14px;
  color: #ccc;
}
</style>
</head>

<body>

<h2>🛵 Entregas</h2>

<div id="lista"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, onChildAdded, remove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "SUA-KEY",
  authDomain: "realidade-60bdb.firebaseapp.com",
  databaseURL: "https://realidade-60bdb-default-rtdb.firebaseio.com",
  projectId: "realidade-60bdb",
  storageBucket: "realidade-60bdb.firebasestorage.app",
  messagingSenderId: "510520738222",
  appId: "1:510520738222:web:272dc6dd89a53d5d02c83f"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const lista = document.getElementById("lista");

// 🔥 AGORA ESCUTA SOMENTE PEDIDOS PRONTOS
onChildAdded(ref(db, "entregas"), (snapshot) => {
  let p = snapshot.val();

  // 🔥 MOSTRAR SÓ PEDIDOS ATIVOS
  if (p.status === "entregue") return;
  if (!p.status || p.status !== "novo") return;

  let div = document.createElement("div");
  div.className = "pedido";

  div.innerHTML = `
    <strong>👤 ${p.cliente}</strong><br>
    <span class="info">📞 ${p.telefone || "não informado"}</span><br>
    <span class="info">📍 ${p.endereco || "retirada no local"}</span><br>
    <span class="info">🕒 ${p.hora}</span><br><br>

    ${p.pedido.replace(/\n/g, "<br>")}

    <br><br>
    <strong>💰 Total: R$ ${p.total || 0}</strong>

    <button onclick="abrirMapa('${p.endereco}')">
      📍 Abrir no mapa
    </button>

    <button onclick="finalizar('${snapshot.key}', this)">
      ✅ Entregue
    </button>
  `;

  lista.prepend(div);
});
  let div = document.createElement("div");
  div.className = "pedido";

  div.innerHTML = `
    <strong>👤 ${p.cliente}</strong><br>
    <span class="info">📞 ${p.telefone || "não informado"}</span><br>
    <span class="info">📍 ${p.endereco || "retirada no local"}</span><br>
    <span class="info">🕒 ${p.hora}</span><br><br>

    ${p.pedido.replace(/\n/g, "<br>")}

    <br><br>
    <strong>💰 Total: R$ ${p.total || 0}</strong>

    <br><br>

    <button class="maps" onclick="abrirMapa('${p.endereco}')">
      📍 Abrir no mapa
    </button>

    <button class="entregue" onclick="finalizar('${snapshot.key}', this)">
      ✅ Entregue
    </button>
  `;

  lista.prepend(div);
});

// 📍 MAPA
window.abrirMapa = function(endereco) {
  if (!endereco) {
    alert("Endereço não informado");
    return;
  }

  let url = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(endereco);
  window.open(url, "_blank");
}

// ✅ FINALIZAR ENTREGA
import { update } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

window.finalizar = function(id, botao) {
  if (!confirm("Marcar como entregue?")) return;

  update(ref(db, "entregas/" + id), {
    status: "entregue"
  });

  botao.parentElement.remove();
}
</script>

</body>
</html>
