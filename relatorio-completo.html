<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="realidade.png">
<title>Relatório de Vendas</title>

<style>
body { font-family: Arial; background: #111; color: #fff; text-align: center; }
.box { background: #222; margin: 15px; padding: 20px; border-radius: 10px; }
.valor { font-size: 26px; font-weight: bold; margin-top: 10px; color: #4caf50; }
button { padding: 10px; margin: 5px; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; }
.reset { background: red; color: white; margin-top: 20px; }
input { padding: 10px; margin: 5px; border-radius: 5px; border: none; }
#loginBox { margin-top: 50px; }
</style>
</head>
<body>

<div id="loginBox">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="senha" placeholder="Senha">
  <button onclick="login()" style="background: #e53935; color: white;">Entrar</button>
</div>

<div id="conteudo" style="display:none;">
  <h2>📊 Relatório de Vendas</h2>

  <div class="box">
    💰 Faturamento Total (Pedidos Finalizados)
    <div id="vendas" class="valor">R$ 0.00</div>
  </div>

  <button class="reset" onclick="resetar()">🗑 Resetar Período e Gerar PDF</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, onValue, get, remove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBZE-EDNUf1Li-kcUx_bhw51ho7dlqXbmM",
  authDomain: "realidade-60bdb.firebaseapp.com",
  databaseURL: "https://realidade-60bdb-default-rtdb.firebaseio.com",
  projectId: "realidade-60bdb",
  storageBucket: "realidade-60bdb.firebasestorage.app",
  messagingSenderId: "510520738222",
  appId: "1:510520738222:web:272dc6dd89a53d5d02c83f"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

window.login = function() {
  let email = document.getElementById("email").value;
  let senha = document.getElementById("senha").value;
  signInWithEmailAndPassword(auth, email, senha).catch((e) => alert("Erro: " + e.message));
};

onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("conteudo").style.display = "block";

    onValue(ref(db, "pedidos"), (snapshot) => {
      let dados = snapshot.val();
      let totalVendas = 0;

      if (!dados) {
          document.getElementById("vendas").innerText = "R$ 0.00";
          return;
      }

      Object.values(dados).forEach(pedido => {
        // Soma apenas pedidos que foram concluídos
        if (pedido.status === "finalizado" || pedido.status === "entregue") {
          totalVendas += Number(pedido.total || 0);
        }
      });

      document.getElementById("vendas").innerText = "R$ " + totalVendas.toFixed(2);
    });
  }
});

async function gerarPDF() {
  const { jsPDF } = window.jspdf;
  let doc = new jsPDF();
  let y = 10;
  doc.text("RELATÓRIO DE FECHAMENTO DE VENDAS", 10, y);
  y += 10;

  const snapshot = await get(ref(db, "pedidos"));
  if (!snapshot.exists()) return;

  snapshot.forEach((item) => {
    let p = item.val();
    if (p.status === "finalizado" || p.status === "entregue") {
        doc.text(`${p.hora || ''} - Cliente: ${p.cliente} - R$ ${Number(p.total).toFixed(2)}`, 10, y);
        y += 10;
        if (y > 280) { doc.addPage(); y = 10; }
    }
  });
  doc.save("relatorio_vendas.pdf");
}

window.resetar = async function() {
  let senha = prompt("Digite a senha para RESETAR TUDO:");
  if (senha !== "1234") return;
  if (!confirm("Isso apagará todos os pedidos do banco de dados. Deseja continuar?")) return;

  await gerarPDF();
  await remove(ref(db, "pedidos"));
  alert("✅ Relatório resetado com sucesso!");
};
</script>
</body>
</html>
