<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Relatório Completo</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: #fff;
  text-align: center;
}

.box {
  background: #222;
  margin: 15px;
  padding: 20px;
  border-radius: 10px;
}

.valor {
  font-size: 26px;
  font-weight: bold;
  margin-top: 10px;
}

button {
  padding: 10px;
  margin: 5px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.reset {
  background: red;
  color: white;
}

.filtro {
  background: #2196f3;
  color: white;
}
</style>

</head>
<body>

<h2>📊 Relatório</h2>

<div class="box">
  💰 Total de vendas
  <div id="vendas" class="valor">R$ 0</div>
</div>

<div class="box">
  🛵 Total de entregas
  <div id="entregas" class="valor">0</div>
</div>

<div class="box">
  💵 Total das entregas
  <div id="valorEntregas" class="valor">R$ 0</div>
</div>

<div class="box">
  💸 Pagamento motoboy (R$5 por entrega)
  <div id="motoboy" class="valor">R$ 0</div>
</div>

<div class="box">
  🛵 Entregas por motoboy
  <div id="listaMotoboys"></div>
</div>

<button class="reset" onclick="resetar()">🗑 Resetar mês</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

// 🔥 CONFIG CORRETA (SUA ORIGINAL)
const firebaseConfig = {
  apiKey: "AIzaSyBZE-EDNUf1Li-kcUx_bhw51ho7dlqXbmM",
  authDomain: "realidade-60bdb.firebaseapp.com",
  databaseURL: "https://realidade-60bdb-default-rtdb.firebaseio.com",
  projectId: "realidade-60bdb",
  storageBucket: "realidade-60bdb.firebasestorage.app",
  messagingSenderId: "510520738222",
  appId: "1:510520738222:web:272dc6dd89a53d5d02c83f"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 🔐 LOGIN
const auth = getAuth(app);
signInWithEmailAndPassword(auth, "realidadelanchesalgadosilvapau@gmail.com", "4639Clarice@")
  .then(() => console.log("✅ Logado"))
  .catch((e) => console.error("Erro login:", e));

// 📊 RELATÓRIO
onValue(ref(db, "pedidos"), (snapshot) => {

  let dados = snapshot.val();
  if (!dados) return;

  let totalVendas = 0;
  let totalEntregas = 0;
  let motoboys = {};

  Object.values(dados).forEach(pedido => {

    // 💰 VENDAS
    if (pedido.status === "finalizado" || pedido.status === "entregue") {
      totalVendas += Number(pedido.total || 0);
    }

    // 🛵 ENTREGAS
    if (pedido.tipo === "delivery" && pedido.status === "entregue") {
      totalEntregas++;

      let nome = pedido.motoboy || "Não informado";

      if (!motoboys[nome]) {
        motoboys[nome] = 0;
      }

      motoboys[nome]++;
    }

  });

  let valorMotoboy = totalEntregas * 5;

  document.getElementById("vendas").innerText = "R$ " + totalVendas.toFixed(2);
  document.getElementById("entregas").innerText = totalEntregas;
  document.getElementById("valorEntregas").innerText = "R$ " + totalVendas.toFixed(2);
  document.getElementById("motoboy").innerText = "R$ " + valorMotoboy.toFixed(2);

  // 👇 LISTA MOTOBOYS
  let lista = "";

  Object.entries(motoboys).forEach(([nome, qtd]) => {
    let valor = qtd * 5;

    lista += `<div>
      ${nome} → ${qtd} entregas → R$ ${valor}
    </div>`;
  });

  document.getElementById("listaMotoboys").innerHTML = lista;

});

// 🔁 RESET (SIMPLES E FUNCIONAL)
// 🗑 RESETAR MÊS
window.resetar = function() {

  let senha = prompt("Digite a senha:");
  if (senha !== "1234") return;

  if (!confirm("Resetar mês?")) return;

  update(ref(db, "config"), {
    dataReset: new Date().toISOString()
  });

  alert("✅ Reset feito!");
}
  if (!confirm("Tem certeza que deseja resetar o relatório do mês?")) return;

  // 👉 AQUI entra o update
  update(ref(db, "relatorios"), {
    totalVendas: 0,
    totalEntregas: 0
  });

  alert("✅ Relatório resetado com sucesso!");
}
// carregar automático
carregar("mes");
</script>

</body>
</html>
